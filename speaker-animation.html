<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boat Speaker Animation</title>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #080808; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; cursor: default; }
  /* Hide playback bar when embedded as iframe */
  #root > div > div:last-child { display: none !important; }
</style>
</head>
<body>
<div id="root" data-screen-label="boat-stereo"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 0; // playback bar hidden
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});


// speaker-scenes.jsx — three subwoofer animations sharing one timeline.
//
// Timeline (8s loop):
//   0.0–1.4   silence/idle drift
//   1.5       THUMP A (deep)
//   1.5–4.8   ringdown + slow oscilloscope
//   5.0       THUMP B (deep)
//   5.0–8.0   ringdown into next loop
//
// All three variations consume the same `useThump()` so they pulse in lockstep —
// you compare style, not motion.

const THUMP_TIMES = [1.5, 5.0];
const THUMP_DECAY = 1.4;     // seconds to ring down to ~0
const THUMP_FREQ  = 7.5;     // Hz of the ringdown oscillation

// Returns { intensity, signed } where:
//   intensity ∈ [0,1+] — overall envelope (for glow, dust, shake)
//   signed    ∈ [-1,1] — oscillating cone displacement (signed)
function useThump() {
  const t = useTime();
  let intensity = 0;
  let signed = 0;
  let lastHitAge = Infinity;

  for (const ht of THUMP_TIMES) {
    const age = t - ht;
    if (age >= 0 && age < THUMP_DECAY) {
      // exponential decay envelope
      const env = Math.exp(-age * 3.2);
      intensity = Math.max(intensity, env);
      // signed oscillation: starts with a hard push out, decays
      const osc = Math.cos(age * THUMP_FREQ * 2 * Math.PI) * env;
      // bias the first half-cycle outward (cone pushes air OUT first)
      signed += osc;
      if (age < lastHitAge) lastHitAge = age;
    }
  }

  // gentle idle drift so nothing is truly static
  const idle = Math.sin(t * 1.1) * 0.04;
  signed += idle;

  return { intensity, signed, lastHitAge, t };
}

// Volumetric light rays from above — slow sweep, intensifies on thump.
function LightRays({ palette }) {
  const { intensity, t } = useThump();
  const sweep = Math.sin(t * 0.18) * 6; // degrees
  const baseAlpha = 0.10 + intensity * 0.18;
  return (
    <div style={{
      position: 'absolute', inset: 0,
      pointerEvents: 'none',
      mixBlendMode: 'screen',
      transform: `rotate(${sweep}deg)`,
      transformOrigin: '50% 0%',
    }}>
      <div style={{
        position: 'absolute',
        left: '50%', top: '-10%',
        width: '140%', height: '140%',
        marginLeft: '-70%',
        background: `conic-gradient(from 180deg at 50% 0%,
          transparent 0deg,
          ${palette.rayA}${Math.round(baseAlpha * 255).toString(16).padStart(2,'0')} 12deg,
          transparent 22deg,
          transparent 158deg,
          ${palette.rayB}${Math.round(baseAlpha * 0.7 * 255).toString(16).padStart(2,'0')} 172deg,
          transparent 182deg,
          transparent 360deg)`,
        filter: 'blur(20px)',
      }}/>
    </div>
  );
}

// Atmospheric haze — subtle radial glow behind cabinet.
function Haze({ palette }) {
  const { intensity } = useThump();
  return (
    <div style={{
      position: 'absolute', inset: 0,
      pointerEvents: 'none',

        ${palette.haze} 0%,

    }}/>

}

// Dust puff: spawned on thump, drifts up, fades.
// We render fixed particles whose lifecycle is tied to age-since-thump.
function DustPuffs({ originY = 0.62, palette }) {
  const t = useTime();
  // Fixed seeded particles — index determines x offset and drift.
  const particles = React.useMemo(() => {
    const arr = [];
    for (let i = 0; i < 24; i++) {
      arr.push({
        i,
        ang: (i / 24) * Math.PI * 2,
        spread: 0.18 + (i % 5) * 0.04,
        rise: 0.55 + ((i * 7) % 10) / 30,
        size: 8 + (i % 4) * 4,
        delay: ((i * 13) % 100) / 1000, // tiny stagger
      });
    }
    return arr;
  }, []);

  return (
    <>
      {THUMP_TIMES.map((ht) => {
        const age = t - ht;
        if (age < 0 || age > 2.2) return null;
        return particles.map((p) => {
          const localAge = age - p.delay;
          if (localAge < 0) return null;
          const life = Math.min(localAge / 1.8, 1);
          const x = Math.cos(p.ang) * p.spread * (0.4 + life * 0.7);
          const y = -p.rise * life * 0.35 - Math.sin(p.ang) * p.spread * 0.15 * life;
          const opacity = (1 - life) * 0.55 * Math.min(localAge * 6, 1);
          const scale = 0.6 + life * 1.2;
          return (
            <div key={`${ht}-${p.i}`} style={{
              position: 'absolute',
              left: `${50 + x * 100}%`,
              top: `${(originY + y) * 100}%`,
              width: p.size,
              height: p.size,
              marginLeft: -p.size / 2,
              marginTop: -p.size / 2,
              borderRadius: '50%',
              background: `radial-gradient(circle, ${palette.dust} 0%, transparent 70%)`,
              opacity,
              transform: `scale(${scale})`,
              filter: 'blur(2px)',
              pointerEvents: 'none',
              mixBlendMode: 'screen',
            }}/>
          );
        });
      })}
    </>
  );
}

// Horizontal oscilloscope strip — reacts to thump.
function Oscilloscope({ y = '88%', palette, height = 60 }) {
  const { intensity, t } = useThump();
  const points = 80;

  // Build path: a sine carrier modulated by thump envelope plus noise.
  let d = '';
  for (let i = 0; i <= points; i++) {
    const x = (i / points) * 100;
    const phase = (i / points) * Math.PI * 6 + t * 2.2;
    const carrier = Math.sin(phase) * 0.25;
    const burst = Math.sin(phase * 2.3 + t * 4) * 0.6 * intensity;
    // pseudo-noise
    const n = (Math.sin(i * 12.9898 + t * 78.233) * 43758.5453) % 1;
    const noise = (n - Math.floor(n) - 0.5) * 0.15 * intensity;
    const yy = 50 + (carrier + burst + noise) * 100;
    d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + yy.toFixed(2) + ' ';
  }

  return (
    <div style={{
      position: 'absolute',
      left: '6%', right: '6%',
      top: y,
      height,
      pointerEvents: 'none',
    }}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
        <defs>
          <linearGradient id={`osc-${palette.id}`} x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%"   stopColor={palette.oscA} stopOpacity="0"/>
            <stop offset="20%"  stopColor={palette.oscA} stopOpacity="1"/>
            <stop offset="80%"  stopColor={palette.oscB} stopOpacity="1"/>
            <stop offset="100%" stopColor={palette.oscB} stopOpacity="0"/>
          </linearGradient>
          <filter id={`oscglow-${palette.id}`} x="-20%" y="-50%" width="140%" height="200%">
            <feGaussianBlur stdDeviation="1.2"/>
          </filter>
        </defs>
        {/* center axis */}
        <line x1="0" y1="50" x2="100" y2="50" stroke={palette.oscAxis} strokeWidth="0.2" vectorEffect="non-scaling-stroke"/>
        {/* glow stroke */}
        <path d={d} fill="none" stroke={`url(#osc-${palette.id})`} strokeWidth="2.5"
              vectorEffect="non-scaling-stroke" opacity={0.5 + intensity * 0.5}
              filter={`url(#oscglow-${palette.id})`}/>
        {/* crisp stroke */}
        <path d={d} fill="none" stroke={`url(#osc-${palette.id})`} strokeWidth="1"
              vectorEffect="non-scaling-stroke"/>
      </svg>
    </div>
  );
}

// Grain overlay — subtle, motion-locked to t for 'film' feel.
function Grain({ amount = 0.06 }) {
  const t = useTime();
  // Tile-shift the grain by time so it crawls.
  const shift = (Math.floor(t * 24) % 4) * 30;
  return (
    <div style={{
      position: 'absolute', inset: 0,
      pointerEvents: 'none',
      mixBlendMode: 'overlay',
      opacity: amount,
      backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>")`,
      backgroundSize: '160px 160px',
      transform: `translate(${shift}px, ${shift * 0.7}px)`,
    }}/>
  );
}

// Camera shake wrapper — subtle, tied to thump intensity.
function ShakeWrap({ children, amount = 6 }) {
  const { intensity, t } = useThump();
  const shake = intensity * amount;
  const dx = Math.sin(t * 47) * shake;
  const dy = Math.cos(t * 53) * shake * 0.7;
  return (
    <div style={{
      position: 'absolute', inset: 0,
      transform: `translate(${dx}px, ${dy}px)`,
      willChange: 'transform',
    }}>
      {children}
    </div>
  );
}

// Cabinet shell — outer wood box used by stylized + photoreal.
// `kind` selects rendering treatment.
// ─────────────────────────────────────────────────────────────
function CabinetShell({ kind, children, palette }) {
  const { intensity } = useThump();

  const gradient = {
    stylized:  `linear-gradient(180deg, ${palette.cabHi} 0%, ${palette.cabMid} 30%, ${palette.cabLo} 100%)`,
    photoreal: `linear-gradient(180deg, ${palette.cabHi} 0%, ${palette.cabMid} 18%, ${palette.cabLo} 60%, #050608 100%)`,
  }[kind];

  // Thin highlight edge across the top
  return (
    <div style={{
      position: 'absolute',
      left: '15%', right: '15%',
      top: '8%', bottom: '12%',
      background: gradient,
      borderRadius: kind === 'stylized' ? 14 : 6,
      boxShadow: kind === 'photoreal'
        ? `inset 0 1px 0 ${palette.cabEdge}, inset 0 -40px 60px rgba(0,0,0,0.5), 0 ${20 + intensity * 10}px ${50 + intensity * 30}px rgba(0,0,0,0.7)`
        : `inset 0 1px 0 ${palette.cabEdge}, 0 ${15 + intensity * 8}px ${30 + intensity * 20}px rgba(0,0,0,0.55)`,
      overflow: 'hidden',
    }}>
      {/* wood/metal texture for photoreal */}
      {kind === 'photoreal' && (
        <div style={{
          position: 'absolute', inset: 0,
          backgroundImage: `repeating-linear-gradient(180deg,
            rgba(255,255,255,0.012) 0px,
            rgba(255,255,255,0.012) 1px,
            transparent 1px,
            transparent 3px)`,
          mixBlendMode: 'overlay',
        }}/>
      )}
      {children}
    </div>
  );
}

// STYLIZED driver — clean concentric shapes.
function StylizedDriver({ size, kind = 'woofer', palette }) {
  const { intensity, signed } = useThump();
  const push = signed * (kind === 'woofer' ? 18 : kind === 'mid' ? 8 : 3);
  const pulseScale = 1 + intensity * (kind === 'woofer' ? 0.06 : 0.02);

  return (
    <div style={{
      width: size, height: size,
      position: 'relative',
      transform: `scale(${pulseScale})`,
    }}>
      {/* Mounting plate */}
      <div style={{
        position: 'absolute', inset: 0,
        borderRadius: '50%',
        background: `linear-gradient(145deg, ${palette.plateHi}, ${palette.plateLo})`,
        boxShadow: 'inset 0 2px 4px rgba(255,255,255,0.08), inset 0 -2px 4px rgba(0,0,0,0.5)',
      }}/>
      {/* Bolts (4 or 6) */}
      {[...Array(kind === 'woofer' ? 6 : 4)].map((_, i) => {
        const n = kind === 'woofer' ? 6 : 4;
        const ang = (i / n) * Math.PI * 2;
        const r = size * 0.43;
        return (
          <div key={i} style={{
            position: 'absolute',
            left: `calc(50% + ${Math.cos(ang) * r}px - 3px)`,
            top: `calc(50% + ${Math.sin(ang) * r}px - 3px)`,
            width: 6, height: 6,
            borderRadius: '50%',
            background: '#1a1d24',
            boxShadow: 'inset 0 1px 1px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.06)',
          }}/>
        );
      })}
      {/* Surround (rubber rim) */}
      <div style={{
        position: 'absolute',
        inset: '12%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 35% 30%, #2a2d36, #0e1014 70%)`,
        boxShadow: 'inset 0 0 12px rgba(0,0,0,0.6)',
      }}/>
      {/* Cone */}
      <div style={{
        position: 'absolute',
        inset: '18%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 40% 35%, ${palette.coneHi}, ${palette.coneLo} 65%, #07090d 100%)`,
        transform: `translateZ(0) scale(${1 + intensity * 0.04})`,
        boxShadow: `inset 0 4px 12px rgba(255,255,255,0.06), inset 0 -8px 14px rgba(0,0,0,0.6),
                    0 0 ${20 + intensity * 30}px ${palette.coneGlow}`,
      }}/>
      {/* Dust cap (bullet) — moves forward/back with `push` (z-style scale) */}
      <div style={{
        position: 'absolute',
        inset: '38%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 35% 30%, ${palette.capHi}, ${palette.capLo} 60%, #04060a 100%)`,
        transform: `scale(${1 + push / 200})`,
        boxShadow: `inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -3px 6px rgba(0,0,0,0.6),
                    0 ${2 + intensity * 4}px ${4 + intensity * 8}px rgba(0,0,0,0.6)`,
      }}/>
      {/* Highlight glint — only on hard hit */}
      {intensity > 0.15 && (
        <div style={{
          position: 'absolute',
          left: '38%', top: '32%',
          width: '8%', height: '5%',
          borderRadius: '50%',
          background: 'rgba(255,255,255,0.4)',
          filter: 'blur(2px)',
          opacity: intensity,
        }}/>
      )}
    </div>
  );
}

// PHOTOREAL driver — adds spider, more layers, screw shadows, depth.
function PhotorealDriver({ size, kind = 'woofer', palette }) {
  const { intensity, signed } = useThump();
  const push = signed * (kind === 'woofer' ? 22 : kind === 'mid' ? 10 : 4);
  const ringRadius = (1 - Math.exp(-intensity * 4)) * 1.5;

  return (
    <div style={{
      width: size, height: size,
      position: 'relative',
    }}>
      {/* Outer chrome ring */}
      <div style={{
        position: 'absolute', inset: 0,
        borderRadius: '50%',
        background: `conic-gradient(from 45deg,
          #2a2e38 0deg, #4a505c 60deg, #1a1d24 130deg,
          #3e4452 200deg, #1c1f26 280deg, #2a2e38 360deg)`,
        boxShadow: `0 ${4 + intensity * 6}px ${10 + intensity * 14}px rgba(0,0,0,0.7),
                    inset 0 1px 1px rgba(255,255,255,0.18),
                    inset 0 -2px 3px rgba(0,0,0,0.7)`,
      }}/>
      {/* Inner gasket */}
      <div style={{
        position: 'absolute', inset: '7%',
        borderRadius: '50%',
        background: '#0a0c10',
        boxShadow: 'inset 0 0 8px rgba(0,0,0,0.9)',
      }}/>
      {/* Screws — 8 around chrome ring */}
      {[...Array(8)].map((_, i) => {
        const ang = (i / 8) * Math.PI * 2 + Math.PI / 8;
        const r = size * 0.46;
        return (
          <div key={i} style={{
            position: 'absolute',
            left: `calc(50% + ${Math.cos(ang) * r}px - 4px)`,
            top: `calc(50% + ${Math.sin(ang) * r}px - 4px)`,
            width: 8, height: 8,
            borderRadius: '50%',
            background: 'radial-gradient(circle at 35% 35%, #6a7180 0%, #2a2e38 60%, #0a0c10 100%)',
            boxShadow: '0 1px 2px rgba(0,0,0,0.8), inset 0 -1px 1px rgba(0,0,0,0.6)',
          }}>
            {/* slot */}
            <div style={{
              position: 'absolute', left: '20%', right: '20%', top: '45%', height: 1,
              background: '#04050a', borderRadius: 1,
              transform: `rotate(${i * 23}deg)`,
            }}/>
          </div>
        );
      })}
      {/* Surround (deep rubber) */}
      <div style={{
        position: 'absolute', inset: '10%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 30% 25%, #2c2f38, #0e1014 55%, #04060a 100%)`,
        boxShadow: 'inset 0 4px 10px rgba(0,0,0,0.7), inset 0 -2px 6px rgba(255,255,255,0.04)',
      }}>
        {/* highlight on rubber */}
        <div style={{
          position: 'absolute',
          left: '20%', top: '8%',
          width: '40%', height: '15%',
          borderRadius: '50%',
          background: 'rgba(255,255,255,0.07)',
          filter: 'blur(4px)',
        }}/>
      </div>
      {/* Cone — paper texture via repeating gradient */}
      <div style={{
        position: 'absolute', inset: '17%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 40% 30%, ${palette.coneHi}, ${palette.coneMid} 50%, ${palette.coneLo} 100%)`,
        transform: `scale(${1 + intensity * 0.03})`,
        boxShadow: `inset 0 6px 18px rgba(255,255,255,0.05), inset 0 -10px 20px rgba(0,0,0,0.7),
                    0 0 ${30 + intensity * 40}px ${palette.coneGlow}`,
      }}>
        {/* radial paper striations */}
        <div style={{
          position: 'absolute', inset: 0,
          borderRadius: '50%',
          background: `repeating-conic-gradient(from 0deg,
            rgba(255,255,255,0.02) 0deg,
            transparent 1deg,
            transparent 3deg,
            rgba(0,0,0,0.04) 4deg,
            transparent 5deg,
            transparent 8deg)`,
          mixBlendMode: 'overlay',
        }}/>
      </div>
      {/* Dust cap (bullet, very 3D) */}
      <div style={{
        position: 'absolute', inset: '37%',
        borderRadius: '50%',
        background: `radial-gradient(circle at 30% 25%, ${palette.capHi}, ${palette.capLo} 55%, #04060a 100%)`,
        transform: `scale(${1 + push / 180})`,
        boxShadow: `inset 0 3px 6px rgba(255,255,255,0.18), inset 0 -4px 8px rgba(0,0,0,0.7),
                    0 ${3 + intensity * 6}px ${6 + intensity * 12}px rgba(0,0,0,0.7)`,
      }}>
        {/* specular highlight */}
        <div style={{
          position: 'absolute',
          left: '22%', top: '18%',
          width: '28%', height: '20%',
          borderRadius: '50%',
          background: 'rgba(255,255,255,0.6)',
          filter: 'blur(3px)',
          opacity: 0.7 + intensity * 0.3,
        }}/>
      </div>
      {/* shock-wave ring on hard hits */}
      {intensity > 0.05 && (
        <div style={{
          position: 'absolute', inset: 0,
          borderRadius: '50%',
          border: `2px solid ${palette.coneGlow}`,
          opacity: Math.max(0, intensity - ringRadius * 0.4) * 0.6,
          transform: `scale(${1 + ringRadius * 0.4})`,
          pointerEvents: 'none',
        }}/>
      )}
    </div>
  );
}

// WIREFRAME driver — pure line art with glow.
function WireframeDriver({ size, kind = 'woofer', palette }) {
  const { intensity, signed } = useThump();
  const push = signed * (kind === 'woofer' ? 18 : kind === 'mid' ? 8 : 3);
  const stroke = palette.line;
  const accent = palette.lineAccent;
  const glow = palette.lineGlow;

  // Multiple ripple rings emanating from center on thump.
  const rings = [];
  for (let i = 0; i < 3; i++) {
    const offset = i * 0.35;
    const localAge = (1 - signed * 0.001); // not used; placeholder
    // Use the time since each thump for ripple expansion.
    rings.push(offset);
  }

  return (
    <div style={{ width: size, height: size, position: 'relative' }}>
      <svg viewBox="0 0 100 100" style={{
        width: '100%', height: '100%',
        overflow: 'visible',
        filter: `drop-shadow(0 0 ${4 + intensity * 8}px ${glow})`,
      }}>
        <defs>
          <radialGradient id={`wfcap-${palette.id}-${kind}`} cx="0.4" cy="0.35" r="0.7">
            <stop offset="0%"  stopColor={accent} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={accent} stopOpacity="0"/>
          </radialGradient>
        </defs>
        {/* Outer plate */}
        <circle cx="50" cy="50" r="49" fill="none" stroke={stroke} strokeWidth="0.6" vectorEffect="non-scaling-stroke"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke={stroke} strokeWidth="0.4" opacity="0.6" vectorEffect="non-scaling-stroke"/>
        {/* Bolts */}
        {[...Array(kind === 'woofer' ? 6 : 4)].map((_, i) => {
          const n = kind === 'woofer' ? 6 : 4;
          const ang = (i / n) * Math.PI * 2;
          const r = 47;
          return <circle key={i} cx={50 + Math.cos(ang) * r * 0.94} cy={50 + Math.sin(ang) * r * 0.94}
            r="1.2" fill="none" stroke={stroke} strokeWidth="0.6" vectorEffect="non-scaling-stroke"/>;
        })}
        {/* Surround */}
        <circle cx="50" cy="50" r="40" fill="none" stroke={stroke} strokeWidth="0.6" vectorEffect="non-scaling-stroke"/>
        <circle cx="50" cy="50" r="36" fill="none" stroke={stroke} strokeWidth="0.5" opacity="0.7" vectorEffect="non-scaling-stroke"/>
        {/* Cone */}
        <circle cx="50" cy="50" r="32" fill="none" stroke={accent} strokeWidth="0.8" vectorEffect="non-scaling-stroke" opacity={0.6 + intensity * 0.4}/>
        {/* Cone striations */}
        {[...Array(16)].map((_, i) => {
          const ang = (i / 16) * Math.PI * 2;
          const x1 = 50 + Math.cos(ang) * 14;
          const y1 = 50 + Math.sin(ang) * 14;
          const x2 = 50 + Math.cos(ang) * 32;
          const y2 = 50 + Math.sin(ang) * 32;
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={stroke} strokeWidth="0.3" opacity="0.4" vectorEffect="non-scaling-stroke"/>;
        })}
        {/* Dust cap — scales with push */}
        <g transform={`translate(50 50) scale(${1 + push / 180}) translate(-50 -50)`}>
          <circle cx="50" cy="50" r="14" fill={`url(#wfcap-${palette.id}-${kind})`} stroke={accent} strokeWidth="1" vectorEffect="non-scaling-stroke"/>
          <circle cx="50" cy="50" r="14" fill="none" stroke={accent} strokeWidth="1.2" vectorEffect="non-scaling-stroke" opacity={0.7 + intensity * 0.3}/>
        </g>
        {/* Crosshairs */}
        <line x1="0" y1="50" x2="100" y2="50" stroke={stroke} strokeWidth="0.2" opacity="0.25" vectorEffect="non-scaling-stroke"/>
        <line x1="50" y1="0" x2="50" y2="100" stroke={stroke} strokeWidth="0.2" opacity="0.25" vectorEffect="non-scaling-stroke"/>
        {/* Ripple rings on hit */}
        {THUMP_TIMES.map((ht, hi) => {
          // We need useTime() here — but we're inside a render, so close over from useThump.
          return null; // ripple is handled below in a separate pass
        })}
      </svg>
      <RippleRings palette={palette} />
    </div>
  );
}

// Ripple rings emanating from a driver — used by wireframe variant.
function RippleRings({ palette }) {
  const t = useTime();
  const items = [];
  for (const ht of THUMP_TIMES) {
    for (let k = 0; k < 3; k++) {
      const age = t - ht - k * 0.18;
      if (age < 0 || age > 1.6) continue;
      const life = age / 1.6;
      const scale = 0.3 + life * 1.4;
      const opacity = (1 - life) * 0.7;
      items.push(
        <div key={`${ht}-${k}`} style={{
          position: 'absolute',
          left: '50%', top: '50%',
          width: '100%', height: '100%',
          marginLeft: '-50%', marginTop: '-50%',
          borderRadius: '50%',
          border: `1px solid ${palette.lineAccent}`,
          transform: `scale(${scale})`,
          opacity,
          pointerEvents: 'none',
        }}/>
      );
    }
  }
  return <>{items}</>;
}

  deepWater:  '#071322',

// A single dolphin silhouette — clean profile, gentle vertical bob.
function Dolphin({ y, startX = -200, speed = 22, scale = 1, depth = 'near', delay = 0, flipped = false }) {
  const t = useTime();
  const localT = t + delay;
  const periodX = 1600 / speed;            // seconds for a full traversal
  const phase = (localT % periodX) / periodX;
  const x = startX + phase * 1700;
  const bob = Math.sin(localT * 0.9) * 6;

  const fill = depth === 'near' ? YACHT.silhouette : YACHT.silhouetteFar;
  const blur = depth === 'near' ? 0.4 : 1.5;
  const op = depth === 'near' ? 1.0 : 0.85;

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y + bob,
      transform: `scale(${scale}) ${flipped ? 'scaleX(-1)' : ''}`,
      transformOrigin: 'center',
      filter: `blur(${blur}px)`,
      opacity: op,
      pointerEvents: 'none',
      willChange: 'transform',
    }}>
      <svg width="180" height="80" viewBox="0 0 180 80" style={{ overflow: 'visible' }}>
        {/* Body — sleek torpedo */}
        <path
          d="M 8,42
             C 30,28 60,22 95,24
             C 125,26 145,32 165,38
             C 168,40 170,42 168,44
             C 152,48 132,52 105,54
             C 90,56 70,60 50,58
             C 30,56 14,52 8,46 Z"
          fill={fill}/>
        {/* Dorsal fin */}
        <path
          d="M 95,24
             C 100,12 108,8 115,12
             C 116,18 110,22 105,26 Z"
          fill={fill}/>
        {/* Tail flukes — split */}
        <path
          d="M 8,42
             C 0,32 -6,30 -10,34
             C -8,40 -2,44 4,46
             C -2,50 -6,54 -8,60
             C -2,60 6,52 10,46 Z"
          fill={fill}/>
        {/* Pectoral fin (lower) */}
        <path
          d="M 60,52
             C 58,62 62,68 70,68
             C 75,64 74,58 72,54 Z"
          fill={fill}/>
        {/* Subtle eye highlight (only for near dolphins) */}
        {depth === 'near' && (
          <circle cx="135" cy="38" r="1.4" fill="rgba(155,205,240,0.5)"/>
        )}
        {/* Belly highlight — separates underside from back */}
        <path
          d="M 30,50 C 60,58 100,58 140,52"
          fill="none"
          stroke="rgba(155,205,240,0.10)"
          strokeWidth="1.5"
          strokeLinecap="round"/>
      </svg>
    </div>
  );
}

// A small fish — used in schools.
function Fish({ x, y, scale = 1, fill, flipped, wagPhase = 0, t }) {
  const wag = Math.sin(t * 6 + wagPhase) * 6;     // tail-wag rotation
  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `scale(${scale}) ${flipped ? 'scaleX(-1)' : ''}`,
      transformOrigin: 'center',
      pointerEvents: 'none',
      willChange: 'transform',
    }}>
      <svg width="36" height="20" viewBox="0 0 36 20" style={{ overflow: 'visible' }}>
        {/* Body — almond shape */}
        <ellipse cx="14" cy="10" rx="13" ry="5" fill={fill}/>
        {/* Tail — wags */}
        <g transform={`rotate(${wag} 26 10)`}>
          <path d="M 26,10 L 36,4 L 33,10 L 36,16 Z" fill={fill}/>
        </g>
        {/* Top fin */}
        <path d="M 12,5 L 17,2 L 19,5 Z" fill={fill}/>
      </svg>
    </div>
  );
}

// School of fish — coordinated drift across screen.
function School({ y, startX = -300, speed = 14, count = 12, depth = 'mid', delay = 0, flipped = false }) {
  const t = useTime();
  const localT = t + delay;
  const periodX = 2000 / speed;
  const phase = (localT % periodX) / periodX;
  const baseX = startX + phase * 2200;

  const fill = depth === 'near' ? YACHT.silhouette
              : depth === 'mid'  ? YACHT.silhouetteFar
              : 'rgba(50, 100, 150, 0.65)';
  const blur = depth === 'near' ? 0.3 : depth === 'mid' ? 1.2 : 2.4;
  const scaleBase = depth === 'near' ? 1.15 : depth === 'mid' ? 0.85 : 0.65;
  const op = depth === 'near' ? 1.0 : depth === 'mid' ? 0.92 : 0.75;

  // Pre-built per-fish positions in school formation.
  const fish = React.useMemo(() => {
    const arr = [];
    for (let i = 0; i < count; i++) {
      // Diamond-ish loose cluster
      const col = i % 4;
      const row = Math.floor(i / 4);
      arr.push({
        ox: col * 26 - row * 8 + (i * 13 % 7),
        oy: row * 14 + ((col + i) % 3) * 4 - 14,
        wagPhase: i * 1.3,
        sc: scaleBase * (0.85 + ((i * 17) % 30) / 100),
      });
    }
    return arr;
  }, [count, scaleBase]);

  return (
    <div style={{
      position: 'absolute', left: 0, top: 0,
      filter: `blur(${blur}px)`,
      opacity: op,
      pointerEvents: 'none',
    }}>
      {fish.map((f, i) => {
        // Each fish bobs slightly out of phase
        const bob = Math.sin(localT * 1.4 + i * 0.5) * 2.5;
        return (
          <Fish key={i}
            x={baseX + f.ox}
            y={y + f.oy + bob}
            scale={f.sc}
            fill={fill}
            flipped={flipped}
            wagPhase={f.wagPhase}
            t={localT}/>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// WATER EQ — smooth fluid bars. Tops use a *single* continuous SVG
// path that connects all bar peaks (like a connected wave skyline) so
// the whole equalizer reads as one liquid surface, not separate rectangles.
// ─────────────────────────────────────────────────────────────
function WaterEQ({ palette, bars = 32, height = 220 }) {
  const t = useTime();

  // Per-bar precomputed band data.
  const bands = React.useMemo(() => {
    const arr = [];
    for (let i = 0; i < bars; i++) {
      const x = i / (bars - 1);
      const dist = Math.abs(x - 0.5) * 2;
      const bassBias = Math.exp(-dist * 1.1);
      // moderate decay — smooth ringdown, not jittery
      const decay = 1.8 + (Math.sin(i * 7.13) * 0.5 + 0.5) * 0.6;
      const phase = (i * 0.41) % (Math.PI * 2);
      arr.push({ x, bassBias, decay, phase });
    }
    return arr;
  }, [bars]);

  // SMOOTH "music playing" feel: superpose multiple slow travelling sine
  // waves of different speeds, directions, and frequencies. No randomness,
  // no per-band noise — pure waves so the surface always reads as a fluid
  // continuum that flows left↔right and rises/falls like a real EQ.
  // Heights are LOWER overall (less HIGH).
  const rawLevels = bands.map((b, i) => {
    const u = i / (bars - 1);                       // 0..1 across spectrum
    // Three travelling waves at different speeds — guarantees no lulls but
    // moves smoothly because frequencies are low and continuous.
    const w1 = Math.sin(t * 1.8 - u * Math.PI * 2.0) * 0.5 + 0.5;
    const w2 = Math.sin(t * 1.1 + u * Math.PI * 3.5 + 0.7) * 0.5 + 0.5;
    const w3 = Math.sin(t * 2.4 - u * Math.PI * 1.2 + 1.9) * 0.5 + 0.5;
    // Bass-end gentle dome (so the middle/low sits a touch higher like music)
    const dome = b.bassBias;
    // Base "music" level — combine waves; cap so it never tops out near 1.
    const music = (w1 * 0.32 + w2 * 0.22 + w3 * 0.16) * (0.55 + dome * 0.45);

    // Soft thump bursts (less aggressive than before — energy capped lower)
    let thump = 0;
    for (const ht of THUMP_TIMES) {
      const age = t - ht;
      if (age < 0 || age > 2.2) continue;
      const env = Math.exp(-age * b.decay);
      // smooth ringdown wobble (cosine, no high-freq noise)
      const wobble = 1 + Math.cos(age * 5 + b.phase) * 0.08 * env;
      thump = Math.max(thump, env * (0.20 + dome * 0.50) * wobble);
    }
    // Cap overall height — keeps EQ shorter, never slams the ceiling
    return Math.min(0.72, music + thump * 0.85);
  });
  // Stronger spatial smoothing kernel [1,2,4,2,1]/10 — adjacent bands flow
  // into each other instead of stepping. This is what makes it read as
  // "fluid music EQ" not "data viz".
  const levels = rawLevels.map((v, i) => {
    const a = rawLevels[i - 2] ?? rawLevels[i - 1] ?? v;
    const b = rawLevels[i - 1] ?? v;
    const c = rawLevels[i + 1] ?? v;
    const d = rawLevels[i + 2] ?? rawLevels[i + 1] ?? v;
    return (a + 2 * b + 4 * v + 2 * c + d) / 10;
  });

  const w = 1000;
  const barW = w / bars;

  // Build a single smooth top path connecting all bar peaks.
  // Use Catmull-Rom-like smoothing via cubic Bézier from neighbours.
  const peaks = levels.map((lv, i) => [i * barW + barW / 2, (1 - lv) * 100]);
  let topPath = `M 0,${peaks[0][1]} L ${peaks[0][0]},${peaks[0][1]} `;
  for (let i = 0; i < peaks.length - 1; i++) {
    const p0 = peaks[i - 1] || peaks[i];
    const p1 = peaks[i];
    const p2 = peaks[i + 1];
    const p3 = peaks[i + 2] || peaks[i + 1];
    // Cubic Bézier control points (Catmull-Rom → Bézier conversion, tension 0.5)
    const c1x = p1[0] + (p2[0] - p0[0]) / 6;
    const c1y = p1[1] + (p2[1] - p0[1]) / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) / 6;
    const c2y = p2[1] - (p3[1] - p1[1]) / 6;
    topPath += `C ${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]} `;
  }
  topPath += `L ${w},${peaks[peaks.length - 1][1]} `;
  // Close the area path
  const areaPath = topPath + `L ${w},100 L 0,100 Z`;

  return (
    <svg viewBox={`0 0 ${w} 100`} preserveAspectRatio="none" style={{
      width: '100%', height,
      overflow: 'visible',
      display: 'block',
    }}>
      <defs>
        <linearGradient id="water-fill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stopColor={palette.rippleHi} stopOpacity="0.85"/>
          <stop offset="35%" stopColor={palette.hiWater}  stopOpacity="0.75"/>
          <stop offset="100%" stopColor={palette.deepWater} stopOpacity="0.85"/>
        </linearGradient>
        <linearGradient id="water-surface" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"  stopColor={palette.platinum} stopOpacity="0"/>
          <stop offset="20%" stopColor={palette.platinum} stopOpacity="0.95"/>
          <stop offset="80%" stopColor={palette.platinum} stopOpacity="0.95"/>
          <stop offset="100%" stopColor={palette.platinum} stopOpacity="0"/>
        </linearGradient>
        <filter id="water-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.4"/>
        </filter>
      </defs>

      {/* Baseline */}
      <line x1="0" y1="100" x2={w} y2="100"
            stroke={palette.platinumSoft} strokeWidth="0.4"
            vectorEffect="non-scaling-stroke" opacity="0.6"/>

      {/* Filled water area under the smooth wave top */}
      <path d={areaPath} fill="url(#water-fill)" opacity="0.85"/>

      {/* Glowing surface stroke */}
      <path d={topPath} fill="none" stroke="url(#water-surface)"
            strokeWidth="2" vectorEffect="non-scaling-stroke"
            opacity="0.9" filter="url(#water-glow)"/>
      <path d={topPath} fill="none" stroke={palette.platinum}
            strokeWidth="0.6" vectorEffect="non-scaling-stroke"
            opacity="0.95"/>

      {/* Subtle vertical band guides — barely visible */}
      {bands.map((b, i) => (
        <line key={i}
          x1={i * barW} y1="0" x2={i * barW} y2="100"
          stroke={palette.platinumDim} strokeWidth="0.2"
          opacity="0.18" vectorEffect="non-scaling-stroke"/>
      ))}

      {/* Concentric ripples emanating from each bar on hits */}
      {THUMP_TIMES.map((ht) =>
        bands.map((b, i) => {
          const age = t - ht;
          if (age < 0 || age > 1.6) return null;
          const env = Math.exp(-age * b.decay) * (0.3 + b.bassBias * 0.85);
          if (env < 0.22) return null;
          const cx = i * barW + barW / 2;
          const cy = (1 - levels[i]) * 100;
          return [0, 0.22].map((delay, k) => {
            const lAge = age - delay;
            if (lAge < 0 || lAge > 1.4) return null;
            const life = lAge / 1.4;
            const rx = (barW * 0.7) + life * 70;
            const ry = (barW * 0.7) * 0.30 + life * 10;
            const op = (1 - life) * env * 0.85;
            return (
              <ellipse key={`${ht}-${i}-${k}`}
                cx={cx} cy={cy} rx={rx} ry={ry}
                fill="none" stroke={palette.rippleHi}
                strokeWidth={0.5} vectorEffect="non-scaling-stroke"
                opacity={op}/>
            );
          });
        })
      )}
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// CAUSTICS — slow-moving water-light pattern.
// ─────────────────────────────────────────────────────────────
function Caustics({ palette }) {
  const t = useTime();
  const { intensity } = useThump();
  const o1 = (t * 8) % 200;
  const o2 = (t * -5 + 100) % 200;

  const causticUrl = (color) => {
    const c = encodeURIComponent(color);
    return `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'>` +
           `<defs><filter id='b'><feGaussianBlur stdDeviation='12'/></filter></defs>` +
           `<g filter='url(%23b)' fill='${c}'>` +
           `<ellipse cx='80' cy='90' rx='60' ry='25' transform='rotate(20 80 90)'/>` +
           `<ellipse cx='220' cy='60' rx='80' ry='18' transform='rotate(-15 220 60)'/>` +
           `<ellipse cx='320' cy='180' rx='70' ry='22' transform='rotate(35 320 180)'/>` +
           `<ellipse cx='100' cy='240' rx='90' ry='20' transform='rotate(-25 100 240)'/>` +
           `<ellipse cx='280' cy='320' rx='65' ry='28' transform='rotate(10 280 320)'/>` +
           `<ellipse cx='160' cy='340' rx='55' ry='16' transform='rotate(45 160 340)'/>` +
           `</g></svg>")`;
  };

  return (
    <>
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        backgroundImage: causticUrl(palette.caustic),
        backgroundSize: '400px 400px',
        backgroundPosition: `${o1}px ${o1 * 0.4}px`,
        mixBlendMode: 'screen',
        opacity: 0.5 + intensity * 0.25,
      }}/>
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        backgroundImage: causticUrl('rgba(155,205,240,0.10)'),
        backgroundSize: '500px 500px',
        backgroundPosition: `${o2}px ${o2 * 0.6}px`,
        mixBlendMode: 'screen',
        opacity: 0.6,
      }}/>
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// MARINE SPEAKER — round flush-mount cabinet, brushed platinum +
// gold accent. Cone visibly pulses on bass hits — using a CSS scale
// transform on a wrapper so the entire driver moves together.
// ─────────────────────────────────────────────────────────────
function MarineSpeaker({ palette, side = 'left' }) {
  const { intensity, signed } = useThump();
  // BIG, OBVIOUS pulse: outer wrapper scales 1 + up to ~6%
  const cabinetPulse = 1 + intensity * 0.06;
  // Cone scale — push pushes cone outward, then ring-down
  const conePulse = 1 + Math.max(0, signed) * 0.10 + intensity * 0.04;
  // Dust cap pushes harder — most visible movement
  const capPush = signed * 26;
  const tilt = side === 'left' ? 14 : -14;

  return (
    <div style={{
      position: 'relative',
      width: '100%', height: '100%',
      transform: `perspective(1600px) rotateY(${tilt}deg) scale(${cabinetPulse})`,
      transformOrigin: side === 'left' ? 'right center' : 'left center',
      transformStyle: 'preserve-3d',
      filter: `drop-shadow(0 ${20 + intensity * 16}px ${30 + intensity * 30}px rgba(0,0,0,0.7))
               drop-shadow(0 0 ${10 + intensity * 28}px rgba(155,205,240,${0.15 + intensity * 0.35}))`,
      transition: 'none',
      willChange: 'transform, filter',
    }}>
      <svg viewBox="0 0 200 200" style={{
        width: '100%', height: '100%',
        overflow: 'visible',
      }}>
        <defs>
          <radialGradient id={`bezel-${side}`} cx="0.4" cy="0.35" r="0.7">
            <stop offset="0%"  stopColor="#e8edf2"/>
            <stop offset="35%" stopColor="#a8b4c3"/>
            <stop offset="60%" stopColor="#5b6878"/>
            <stop offset="100%" stopColor="#1c2230"/>
          </radialGradient>
          <radialGradient id={`bezel-rim-${side}`} cx="0.5" cy="0.5" r="0.5">
            <stop offset="92%" stopColor="transparent"/>
            <stop offset="96%" stopColor="rgba(255,255,255,0.6)"/>
            <stop offset="100%" stopColor="transparent"/>
          </radialGradient>
          <radialGradient id={`cone-${side}`} cx="0.4" cy="0.35" r="0.7">
            <stop offset="0%"  stopColor="#1f2e44"/>
            <stop offset="50%" stopColor="#0c1828"/>
            <stop offset="100%" stopColor="#03070d"/>
          </radialGradient>
          <radialGradient id={`coneglow-${side}`} cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%"  stopColor={palette.rippleHi} stopOpacity={0.5 + intensity * 0.4}/>
            <stop offset="60%" stopColor={palette.rippleHi} stopOpacity={0.10 + intensity * 0.20}/>
            <stop offset="100%" stopColor={palette.rippleHi} stopOpacity="0"/>
          </radialGradient>
          <radialGradient id={`cap-${side}`} cx="0.35" cy="0.3" r="0.7">
            <stop offset="0%" stopColor="#f3deaa"/>
            <stop offset="40%" stopColor={palette.gold}/>
            <stop offset="100%" stopColor="#5a4520"/>
          </radialGradient>
        </defs>

        {/* Outer mounting ring */}
        <circle cx="100" cy="100" r="98" fill={`url(#bezel-${side})`}/>
        <circle cx="100" cy="100" r="98" fill={`url(#bezel-rim-${side})`}/>
        <circle cx="100" cy="100" r="92" fill="none"
                stroke="rgba(0,0,0,0.55)" strokeWidth="2"/>
        {/* Brushed sweep */}
        <g opacity="0.22" style={{ mixBlendMode: 'overlay' }}>
          {[...Array(60)].map((_, i) => {
            const a = (i / 60) * Math.PI * 2;
            return <line key={i}
              x1={100 + Math.cos(a) * 70}
              y1={100 + Math.sin(a) * 70}
              x2={100 + Math.cos(a) * 95}
              y2={100 + Math.sin(a) * 95}
              stroke={i % 2 ? '#fff' : '#000'} strokeWidth="0.4" opacity="0.5"/>;
          })}
        </g>

        {/* Hex screws */}
        {[...Array(8)].map((_, i) => {
          const a = (i / 8) * Math.PI * 2 + Math.PI / 8;
          const r = 88;
          const cx = 100 + Math.cos(a) * r;
          const cy = 100 + Math.sin(a) * r;
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r="3.4" fill="#1a2030"
                      stroke="rgba(255,255,255,0.15)" strokeWidth="0.4"/>
              <circle cx={cx} cy={cy} r="2.0" fill={palette.gold} opacity="0.85"/>
              <circle cx={cx} cy={cy} r="2.0" fill="none"
                      stroke="rgba(0,0,0,0.5)" strokeWidth="0.3"/>
            </g>
          );
        })}

        {/* Inner gasket */}
        <circle cx="100" cy="100" r="78" fill="#04060c"/>
        <circle cx="100" cy="100" r="78" fill="none"
                stroke="rgba(0,0,0,0.9)" strokeWidth="1.5"/>

        {/* Surround */}
        <circle cx="100" cy="100" r="70" fill={`url(#cone-${side})`}/>
        <ellipse cx="80" cy="78" rx="20" ry="6"
                 fill="rgba(255,255,255,0.06)" transform="rotate(-30 80 78)"/>

        {/* Cone — pulses */}
        <g transform={`translate(100,100) scale(${conePulse}) translate(-100,-100)`}>
          <circle cx="100" cy="100" r="58" fill={`url(#cone-${side})`}/>
          <circle cx="100" cy="100" r="58" fill={`url(#coneglow-${side})`}/>
          {[...Array(48)].map((_, i) => {
            const a = (i / 48) * Math.PI * 2;
            return <line key={i}
              x1={100 + Math.cos(a) * 22}
              y1={100 + Math.sin(a) * 22}
              x2={100 + Math.cos(a) * 58}
              y2={100 + Math.sin(a) * 58}
              stroke="rgba(255,255,255,0.05)" strokeWidth="0.3"/>;
          })}
          <circle cx="100" cy="100" r="40" fill="none"
                  stroke="rgba(255,255,255,0.08)" strokeWidth="0.5"/>
        </g>

        {/* Dust cap (gold bullet) — pulses harder */}
        <g transform={`translate(100,100) scale(${1 + capPush / 200})`}>
          <circle r="22" fill={`url(#cap-${side})`}/>
          <circle r="22" fill="none" stroke="rgba(0,0,0,0.4)" strokeWidth="0.6"/>
          <ellipse cx="-7" cy="-9" rx="7" ry="4"
                   fill="rgba(255,255,255,0.65)" opacity={0.7 + intensity * 0.3}
                   transform="rotate(-25 -7 -9)"/>
        </g>

        {/* Outer halo on hit */}
        {intensity > 0.05 && (
          <circle cx="100" cy="100" r={100 + intensity * 18}
                  fill="none" stroke={palette.rippleHi}
                  strokeWidth={0.8}
                  opacity={intensity * 0.6}
                  vectorEffect="non-scaling-stroke"/>
        )}
      </svg>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// HORIZON — soft god-rays from above
// ─────────────────────────────────────────────────────────────
function Horizon({ palette }) {
  const { intensity, t } = useThump();
  const sweep = Math.sin(t * 0.15) * 4;
  return (
    <>
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        mixBlendMode: 'screen',
        transform: `rotate(${sweep}deg)`,
        transformOrigin: '50% 0%',
      }}>
        <div style={{
          position: 'absolute',
          left: '50%', top: '-5%',
          width: '120%', height: '120%',
          marginLeft: '-60%',
          background: `conic-gradient(from 180deg at 50% 0%,
            transparent 0deg,
            rgba(155,205,240,${0.08 + intensity * 0.10}) 14deg,
            transparent 26deg,
            transparent 154deg,
            rgba(225,211,163,${0.05 + intensity * 0.08}) 174deg,
            transparent 184deg,
            transparent 360deg)`,
          filter: 'blur(28px)',
        }}/>
      </div>
      <div style={{
        position: 'absolute',
        left: '8%', right: '8%',
        top: '46%',
        height: 1,
        background: `linear-gradient(90deg, transparent 0%, ${palette.platinumDim} 30%, ${palette.platinumSoft} 50%, ${palette.platinumDim} 70%, transparent 100%)`,
        opacity: 0.55,
      }}/>
    </>
  );
}

function Floor() {
  return (
    <div style={{
      position: 'absolute',
      left: 0, right: 0, bottom: 0,
      height: '38%',
      pointerEvents: 'none',
      background: 'linear-gradient(180deg, transparent 0%, rgba(2,4,10,0.4) 60%, rgba(2,4,10,0.85) 100%)',
    }}/>
  );
}

function Vignette() {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      pointerEvents: 'none',
      background: 'radial-gradient(ellipse 85% 75% at 50% 48%, transparent 38%, rgba(0,0,0,0.55) 92%, rgba(0,0,0,0.9) 100%)',
    }}/>
  );
}

// ─────────────────────────────────────────────────────────────
// MAIN STEREO SCENE
// ─────────────────────────────────────────────────────────────
function StereoScene() {
  const { intensity, t } = useThump();
  const camScale = 1 + Math.sin(t * 0.32) * 0.008 + intensity * 0.004;
  const camDx = Math.sin(t * 0.21) * 4 + Math.sin(t * 47) * intensity * 2.4;
  const camDy = Math.cos(t * 0.18) * 3 + Math.cos(t * 53) * intensity * 2;

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: YACHT.bgGrad,
      overflow: 'hidden',
    }}>
      {/* Atmospheric haze pulse */}
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        background: `radial-gradient(ellipse 65% 50% at 50% 55%, rgba(120, 170, 220, ${0.08 + intensity * 0.12}) 0%, transparent 65%)`,
      }}/>

      <Horizon palette={YACHT} />

      {/* OCEAN LIFE — disabled per design direction */}
      {/* <OceanLife /> */}

      {/* Caustics over the fish — gives them a shimmering underwater look */}
      <Caustics palette={YACHT} />

      <Floor />

      <div style={{
        position: 'absolute', inset: 0,
        transform: `translate(${camDx}px, ${camDy}px) scale(${camScale})`,
        transformOrigin: '50% 55%',
        willChange: 'transform',
      }}>
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '4% 5%',
          gap: '3%',
        }}>
          <div style={{ width: 360, height: 360, flexShrink: 0 }}>
            <MarineSpeaker palette={YACHT} side="left" />
          </div>

          <div style={{
            flex: 1,
            maxWidth: 720,
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'center',
            position: 'relative',
            gap: 12,
          }}>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
              fontSize: 11,
              letterSpacing: '0.18em',
              color: YACHT.platinumSoft,
              textTransform: 'uppercase',
            }}>
              <span>Spectrum</span>
              <span style={{ color: YACHT.goldSoft }}>●&nbsp; LIVE</span>
              <span>20Hz · 20kHz</span>
            </div>

            <div style={{
              position: 'relative',
              padding: '10px 0',
              borderTop: `1px solid ${YACHT.platinumDim}`,
              borderBottom: `1px solid ${YACHT.platinumDim}`,
              boxShadow: `inset 0 0 60px rgba(155, 205, 240, ${0.05 + intensity * 0.08})`,
              background: 'rgba(2,5,12,0.55)',         // slight backing so EQ reads against fish
              backdropFilter: 'blur(2px)',
              WebkitBackdropFilter: 'blur(2px)',
            }}>
              <div style={{ position: 'relative', height: 220 }}>
                <WaterEQ palette={YACHT} bars={32} height={220} />
              </div>
              <div style={{
                position: 'relative',
                height: 80,
                marginTop: 4,
                opacity: 0.35,
                transform: 'scaleY(-1)',
                maskImage: 'linear-gradient(180deg, black, transparent)',
                WebkitMaskImage: 'linear-gradient(180deg, black, transparent)',
              }}>
                <WaterEQ palette={YACHT} bars={32} height={80} />
              </div>
            </div>

            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
              fontSize: 10,
              letterSpacing: '0.2em',
              color: YACHT.platinumDim,
              textTransform: 'uppercase',
            }}>
              <span>CH·L</span>
              <div style={{ flex: 1, margin: '0 16px', display: 'flex', gap: 4 }}>
                {[...Array(40)].map((_, i) => (
                  <div key={i} style={{
                    flex: 1,
                    height: i % 5 === 0 ? 6 : 3,
                    background: i % 5 === 0 ? YACHT.platinumSoft : YACHT.platinumDim,
                  }}/>
                ))}
              </div>
              <span>CH·R</span>
            </div>
          </div>

          <div style={{ width: 360, height: 360, flexShrink: 0 }}>
            <MarineSpeaker palette={YACHT} side="right" />
          </div>
        </div>
      </div>

      <Vignette />

      {/* Subtle grain */}
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        opacity: 0.04,
        mixBlendMode: 'overlay',
        backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>")`,
        backgroundSize: '160px 160px',
      }}/>
    </div>
  );
}

Object.assign(window, { StereoScene, WaterEQ, MarineSpeaker, OceanLife });

// app.jsx — single featured stereo scene, full-bleed.
const FEATURED_W = 1600;
const FEATURED_H = 460;
const DURATION = 8;

function SpeakerApp() {
  const { Stage, StereoScene } = window;
  return (
    <div style={{ position: 'absolute', inset: 0, background: '#02030a' }}>
      <Stage
        width={FEATURED_W}
        height={FEATURED_H}
        duration={DURATION}
        background="#02030a"
        loop={true}
        autoplay={true}
        persistKey="boat:stereo"
      >
        <StereoScene />
      </Stage>
    </div>
  );
}

function tryMount() {
  const need = ['Stage', 'StereoScene'];
  if (need.every(k => window[k])) {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SpeakerApp />);
  } else {
    setTimeout(tryMount, 30);
  }
}
tryMount();

</script>
